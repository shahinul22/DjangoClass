{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}

{% block content %}
<div class="container mt-5">
    <h2>Reset Password</h2>
    <p>Enter your email, and we'll send you instructions to reset your password.</p>
    <form method="post" class="p-4 border rounded bg-white shadow-sm" id="password-reset-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-warning">Send Reset Email</button>
    </form>
</div>

<script>
    // Capture the form submission event
    document.getElementById('password-reset-form').addEventListener('submit', function(event) {
        // Prevent the form from actually submitting
        event.preventDefault();
        
        // Log form data to the console
        let formData = new FormData(event.target);
        let formDetails = {};
        formData.forEach((value, key) => {
            formDetails[key] = value;
        });
        
        console.log("Form Submitted with the following data:", formDetails);
        
        // Now submit the form
        event.target.submit();
    });
</script>
{% endblock %}
